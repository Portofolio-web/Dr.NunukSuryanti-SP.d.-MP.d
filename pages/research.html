<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <link rel="stylesheet" href="../css/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Penelitian - Portofolio Tri Dharma">
  <title>Penelitian - Portofolio Tri Dharma</title>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=11">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      }
    }
  </script>
  <style>
    .research-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    
    .research-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .research-card-image {
      width: 100%;
      height: 160px;
      overflow: hidden;
      background: var(--bg-main);
    }
    
    .research-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .research-card-content {
      padding: 16px;
    }
    
    .research-card-year {
      font-size: 12px;
      color: var(--accent-blue);
      font-weight: 600;
      margin-bottom: 6px;
    }
    
    .research-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .research-card-doi {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
    }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    
    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    @media (max-width: 768px) {
      .research-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<header>
  <div class="header-top-row">
    <a href="../index.html" class="brand-logo-zone" id="brandName">
      Nama Pemilik Website
    </a>

    <div class="center-search-pill">
      <i class="ri-search-line"></i>
      <input
        type="text"
        id="newsGlobalSearch"
        class="pill-search-input"
        placeholder="Cari publikasi penelitian..."
      >
    </div>

    <div class="right-actions-zone">
      <button id="themeToggleBtn" class="icon-btn">
        <i id="themeIcon" class="ri-sun-line"></i>
      </button>
    </div>
  </div>

  <div class="header-tabs-row">
    <a href="../index.html" class="nav-tab-item">Beranda</a>
    <a href="profile.html" class="nav-tab-item">Profil</a>
    <a href="education.html" class="nav-tab-item">Pendidikan</a>
    <a href="research.html" class="nav-tab-item active">Penelitian</a>
    <a href="community.html" class="nav-tab-item">Pengabdian</a>
  </div>
</header>

<main class="google-news-workspace  flex-1">

  <div class="section-title-area">
    <h2>Publikasi Penelitian</h2>
  </div>

  <div class="research-grid" id="researchGridContainer">
    <div class="empty-state" style="grid-column: 1 / -1;">
      <i class="ri-microscope-line"></i>
      <p>Belum ada publikasi penelitian</p>
    </div>
  </div>

</main>

<footer>
  <div class="footer-links-row">
    <a id="ftWA" href="#" target="_blank" class="footer-anchor">
      <i class="ri-whatsapp-line"></i> WhatsApp
    </a>

    <a id="ftFB" href="#" target="_blank" class="footer-anchor">
      <i class="ri-facebook-circle-line"></i> Facebook
    </a>

    <a id="ftEmail" href="#" class="footer-anchor">
      <i class="ri-mail-open-line"></i> E-Mail
    </a>
  </div>

  <div class="copyright-text" id="copyrightText">
    © 2026 Google News Style Portfolio System.
  </div>
</footer>

<script src="../firebase/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/firebase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const dbRes = JSON.parse(localStorage.getItem("db_res_v5")) || [];
  const container = document.getElementById("researchGridContainer");
  
  const thumbRes = "https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=150";
  
  if (dbRes.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <i class="ri-microscope-line"></i>
        <p>Belum ada publikasi penelitian</p>
      </div>
    `;
  } else {
    let html = "";
    dbRes.forEach((item, idx) => {
      const photo = Array.isArray(item.photo) ? item.photo[0] : item.photo || "";
      const hasRealPhoto = item.hasCustomPhoto || (
        photo && 
        photo !== thumbRes &&
        !photo.includes("photo-") && 
        !photo.includes("unsplash.com")
      );
      const mediaHtml = hasRealPhoto ? `
        <div class="research-card-image">
          <img src="${photo}" alt="${item.title}">
        </div>
      ` : '';
      html += `
        <div class="card research-card animate-on-scroll">
          ${mediaHtml}
          <div class="research-card-content">
            <div class="research-card-year">${item.year}</div>
            <div class="research-card-title">${item.title}</div>
            ${item.doi ? `<div class="research-card-doi"><strong>DOI:</strong> ${item.doi}</div>` : ''}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }
  
  // Search functionality
  document.getElementById("newsGlobalSearch").addEventListener("input", (e) => {
    const query = e.target.value.toLowerCase();
    const cards = container.querySelectorAll(".research-card");
    
    cards.forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = text.includes(query) ? "block" : "none";
    });
  });
});
</script>

</body>
</html>
