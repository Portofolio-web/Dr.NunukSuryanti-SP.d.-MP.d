<!DOCTYPE html>
<html lang="id">

<head>
  <link rel="stylesheet" href="./css/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ① Supabase JS Client v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    
    .popup-overlay {
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease-in-out;
    }
    .popup-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .popup-box {
      transform: scale(0.9);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .popup-overlay.active .popup-box {
      transform: scale(1);
    }
    
    /* Chrome Autofill styles */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      transition: background-color 5000s ease-in-out 0s !important;
      -webkit-text-fill-color: #000000 !important;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-600 to-indigo-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Decorative Background Shapes -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

  <div class="w-full max-w-md bg-white/70 backdrop-blur-xl rounded-[2rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] p-8 sm:p-10 relative z-10 border border-white/40">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white mb-5 shadow-lg shadow-blue-600/30">
        <i class="ri-shield-keyhole-fill text-3xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-black tracking-tight">Admin Portal</h1>
      <p class="text-sm text-slate-800 mt-2 font-semibold">Masuk untuk mengelola konten website</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-black mb-2">Username / Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="ri-mail-line text-slate-800 text-[18px]"></i>
          </div>
          <input type="text" id="username" placeholder="admin@domain.com" required autocomplete="username" 
            class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-300 text-black text-[15px] rounded-xl focus:outline-none focus:ring-[3px] focus:ring-blue-500/20 focus:border-blue-600 focus:bg-white transition-all placeholder-slate-500 font-bold">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-black mb-2">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="ri-lock-line text-slate-800 text-[18px]"></i>
          </div>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" 
            class="w-full pl-11 pr-12 py-3.5 bg-white/50 border border-slate-300 text-black text-[15px] rounded-xl focus:outline-none focus:ring-[3px] focus:ring-blue-500/20 focus:border-blue-600 focus:bg-white transition-all placeholder-slate-500 font-bold">
          <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center">
            <i class="ri-eye-off-line text-slate-700 hover:text-black cursor-pointer text-[18px] transition-colors" id="togglePw" title="Tampilkan password"></i>
          </div>
        </div>
      </div>

      <div class="pt-3">
        <button type="submit" id="loginBtn" 
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_14px_0_rgba(37,99,235,0.25)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.23)] transition-all duration-200 transform hover:-translate-y-[1px] disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none text-[15px]">
          Masuk ke Dashboard
        </button>
      </div>
    </form>

    <div class="mt-8 text-center">
      <a href="index.html" class="inline-flex items-center justify-center gap-2 text-sm font-extrabold text-slate-800 hover:text-black transition-colors">
        <i class="ri-arrow-left-line text-lg"></i>
        Kembali ke Beranda
      </a>
    </div>
  </div>

  <!-- POPUP SUKSES -->
  <div class="popup-overlay fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" id="successOverlay">
    <div class="popup-box bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full text-center mx-4">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-emerald-50 text-emerald-500 mb-5 shadow-sm border border-emerald-100">
        <i class="ri-check-line text-4xl"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Login Berhasil</h2>
      <p class="text-sm text-slate-500 font-medium">Mengalihkan ke dashboard...</p>
    </div>
  </div>

  <!-- POPUP ERROR -->
  <div class="popup-overlay fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" id="errorOverlay">
    <div class="popup-box bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full text-center mx-4">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-50 text-red-500 mb-5 shadow-sm border border-red-100">
        <i class="ri-close-line text-4xl"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Login Gagal</h2>
      <p class="text-sm text-slate-500 font-medium" id="errorMsg">Username atau password salah</p>
    </div>
  </div>

  <script>
    /* =============================================
       KONFIGURASI AKUN ADMIN
       Ganti username dan password di sini
    ============================================= */
    var ADMIN_ACCOUNTS = [
      { username: "admin", password: "admin12345" },
      { username: "admin@gmail.com", password: "admin12345" }
      // Tambah akun lain di sini jika perlu:
      // { username: "dosen1", password: "password123" },
    ];

    /* ---- Toggle show/hide password ---- */
    var togglePw = document.getElementById("togglePw");
    var pwInput = document.getElementById("password");
    togglePw.addEventListener("click", function () {
      var isHidden = pwInput.type === "password";
      pwInput.type = isHidden ? "text" : "password";
      togglePw.className = isHidden
        ? "ri-eye-line toggle-pw"
        : "ri-eye-off-line toggle-pw";
    });

    /* ---- Form submit and Auth checks ---- */
  </script>
  <script>
    /* ============================================================
       SUPABASE AUTH — LOGIN PAGE
       Menggunakan Supabase JS Client v2 via CDN.
       Kredensial: buat user di Supabase Dashboard → Authentication → Users.
    ============================================================ */
    const _supabase = supabase.createClient(
      'https://qmvqfusxnafojqophrwo.supabase.co',
      'sb_publishable_ZLAa1v4ArB1LZDUxp0BlNA_24Egfn4h'
    );

    // Redirect jika sudah login
    _supabase.auth.getSession().then(function ({ data }) {
      if (data.session) {
        window.location.replace('./admin/index.html');
      }
    });

    var loginForm     = document.getElementById('loginForm');
    var loginBtn      = document.getElementById('loginBtn');
    var successOverlay = document.getElementById('successOverlay');
    var errorOverlay  = document.getElementById('errorOverlay');
    var errorMsg      = document.getElementById('errorMsg');

    function showError(msg) {
      if (errorMsg) errorMsg.textContent = msg;
      if (errorOverlay) errorOverlay.classList.add('active');
      setTimeout(function () {
        if (errorOverlay) errorOverlay.classList.remove('active');
      }, 2500);
    }

    if (loginForm) {
      loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        var email    = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Email dan password tidak boleh kosong!');
          return;
        }

        if (loginBtn) {
          loginBtn.disabled    = true;
          loginBtn.textContent = 'Sedang masuk...';
        }

        try {
          /* ── SUPABASE AUTH ── */
          var result = await _supabase.auth.signInWithPassword({ email: email, password: password });
          if (result.error) throw result.error;

          // Simpan penanda sesi lokal (kompatibilitas legacy)
          try {
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('adminUser',  email);
            localStorage.setItem('isLoggedIn',   'true');
            localStorage.setItem('adminUser',    email);
          } catch (_) {}

          if (successOverlay) successOverlay.classList.add('active');
          setTimeout(function () { window.location.href = './admin/index.html'; }, 1500);

        } catch (err) {
          if (loginBtn) {
            loginBtn.disabled    = false;
            loginBtn.textContent = 'Login';
          }
          console.error('Login error:', err);
          showError('Email atau password salah.');
        }
      });
    }
  </script>

</body>

</html>
